name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1"
        required: true
        default: "v0.1"

permissions:
  contents: write

jobs:
  windows-x64:
    name: Windows x64 release
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with v, got '$tag'."
          }
          $tagVersion = $tag.Substring(1)
          $segments = $tagVersion.Split(".")
          if ($segments.Count -eq 2) {
            $crateVersion = "$tagVersion.0"
          } else {
            $crateVersion = $tagVersion
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "crate_version=$crateVersion" >> $env:GITHUB_OUTPUT
          "asset_name=rsync-win-$tag-x86_64-pc-windows-msvc.zip" >> $env:GITHUB_OUTPUT

      - name: Check package version
        shell: pwsh
        run: |
          $metadata = cargo metadata --format-version 1 --no-deps | ConvertFrom-Json
          $package = $metadata.packages | Where-Object { $_.name -eq "rsync-cli" } | Select-Object -First 1
          if ($package.version -ne "${{ steps.release.outputs.crate_version }}") {
            throw "Tag ${{ steps.release.outputs.tag }} expects package version ${{ steps.release.outputs.crate_version }}, got $($package.version)."
          }

      - name: Test
        run: cargo test --workspace --all-features

      - name: Build release binary
        run: cargo build --release -p rsync-cli --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 -Tag "${{ steps.release.outputs.tag }}" -Target "x86_64-pc-windows-msvc" -SkipBuild

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.asset_name }}
          path: |
            dist/${{ steps.release.outputs.asset_name }}
            dist/${{ steps.release.outputs.asset_name }}.sha256

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $asset = "dist/${{ steps.release.outputs.asset_name }}"
          $checksum = "$asset.sha256"
          $notes = @"
          rsync-win $tag

          Windows x64 prebuilt executable for the native Rust rsync-win development build.

          This is an early release. Review README.md for supported options, limitations, license terms, and references.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset $checksum --clobber
          } else {
            gh release create $tag $asset $checksum --title "rsync-win $tag" --notes $notes
          }
