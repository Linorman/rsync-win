name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust workspace
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Parser golden tests
        run: cargo test -p rsync-cli --test options --all-features
      - name: Security regression tests
        run: cargo test -p rsync-cli --test security_remote_peer --all-features
      - name: Interop fixture matrix
        run: cargo test -p rsync-cli --test rsync_compat --all-features
      - name: Test
        run: cargo test --workspace --all-features
      - name: Package smoke test
        shell: pwsh
        run: .\scripts\package-release.ps1 -Tag v0.1.5
