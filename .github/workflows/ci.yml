name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust workspace (${{ matrix.rust }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.76.0"]
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Parser golden tests
        run: cargo test -p rsync-cli --test options --all-features
      - name: Security regression tests
        run: cargo test -p rsync-cli --test security_remote_peer --all-features
      - name: Interop fixture matrix
        run: cargo test -p rsync-cli --test rsync_compat --all-features
      - name: Test
        run: cargo test --workspace --all-features
      - name: Package smoke test
        shell: pwsh
        run: .\scripts\package-release.ps1 -Tag v0.2.0
